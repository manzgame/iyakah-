<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YT Downloader Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        
        :root {
            --primary: #ff0000;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a0033);
            color: #fff;
            min-height: 100vh;
            padding: 15px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 620px;
            margin: 0 auto;
            background: rgba(20, 20, 40, 0.95);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        
        header {
            background: linear-gradient(90deg, #ff0000, #cc0000);
            padding: 20px;
            text-align: center;
            position: relative;
        }
        
        header h1 {
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .input-area {
            padding: 25px;
            background: rgba(0,0,0,0.3);
        }
        
        input {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 16px;
        }
        
        .options {
            display: flex;
            gap: 12px;
            padding: 0 25px 25px;
        }
        
        .tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 20px rgba(255,0,0,0.4);
        }
        
        .content {
            padding: 0 25px 30px;
        }
        
        .result {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 20px;
            margin-top: 15px;
            display: none;
        }
        
        .thumbnail {
            width: 100%;
            border-radius: 14px;
            margin-bottom: 15px;
        }
        
        .formats {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }
        
        .format-card {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .format-card:hover {
            background: rgba(255,0,0,0.3);
            transform: scale(1.05);
        }
        
        .format-card.selected {
            background: #ff0000;
            color: white;
        }
        
        .download-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #ff0000, #ff5500);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            margin-top: 15px;
            cursor: pointer;
        }
        
        .loading {
            text-align: center;
            padding: 40px 20px;
            display: none;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top-color: #ff0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .history {
            margin-top: 30px;
            padding: 0 25px;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fab fa-youtube"></i> YT Downloader Pro</h1>
        </header>
        
        <div class="input-area">
            <input type="text" id="urlInput" placeholder="Paste YouTube link di sini..." />
        </div>
        
        <div class="options">
            <div class="tab active" onclick="switchTab(0)" id="tab0">🎥 Video</div>
            <div class="tab" onclick="switchTab(1)" id="tab1">🎵 Audio</div>
        </div>
        
        <div class="content">
            <button onclick="startDownload()" class="download-btn" id="mainBtn">
                <i class="fas fa-search"></i> Ambil Info & Pilih Format
            </button>
            
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Sedang mengambil data dari YouTube...</p>
            </div>
            
            <div id="error" style="display:none; color:#ff6666; text-align:center; padding:15px; background:rgba(255,0,0,0.2); border-radius:12px;"></div>
            
            <div id="result" class="result">
                <img id="thumbnail" class="thumbnail" alt="">
                <h3 id="videoTitle" style="margin:15px 0 10px;"></h3>
                <p id="videoDuration" style="opacity:0.8; font-size:14px;"></p>
                
                <div id="formatsContainer" class="formats"></div>
                
                <button onclick="downloadSelected()" class="download-btn" id="finalDownloadBtn">
                    ⬇️ Download File Terpilih
                </button>
            </div>
        </div>
        
        <div class="history" id="historySection" style="display:none;">
            <h4>Riwayat Download</h4>
            <div id="historyList"></div>
        </div>
        
        <footer>
            Advanced YouTube Downloader • Client Side • Mobile Friendly
        </footer>
    </div>

    <script>
        let currentInfo = null;
        let selectedFormat = null;
        let currentType = 'video';
        let downloadHistory = [];
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i === tab);
            });
            currentType = tab === 0 ? 'video' : 'audio';
        }
        
        async function startDownload() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                showError('Masukkan link YouTube!');
                return;
            }
            
            resetUI();
            showLoading(true);
            
            try {
                const info = await getVideoInfo(url);
                currentInfo = info;
                
                document.getElementById('thumbnail').src = info.thumbnail || '';
                document.getElementById('videoTitle').textContent = info.title || 'Untitled';
                document.getElementById('videoDuration').textContent = `Durasi: ${info.duration || 'N/A'}`;
                
                renderFormats(info);
                document.getElementById('result').style.display = 'block';
            } catch (e) {
                showError(e.message);
            } finally {
                showLoading(false);
            }
        }
        
        async function getVideoInfo(url) {
            const AUTH = '20250901majwlqo';
            const postData = new URLSearchParams({
                auth: AUTH,
                domain: 'api-ak.vidssave.com',
                origin: 'source',
                link: url
            }).toString();
            
            const res = await fetch('https://api.vidssave.com/api/contentsite_api/media/parse', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: postData
            });
            
            const json = await res.json();
            if (json.status !== 1) throw new Error(json.message || 'Gagal mengambil data');
            return json.data;
        }
        
        function renderFormats(info) {
            const container = document.getElementById('formatsContainer');
            container.innerHTML = '';
            
            const filtered = info.resources.filter(r => {
                if (currentType === 'video') return r.type === 'video' && r.format === 'MP4';
                return r.type === 'audio';
            });
            
            filtered.forEach((format, index) => {
                const div = document.createElement('div');
                div.className = 'format-card';
                div.innerHTML = `
                    <strong>${format.quality || format.format}</strong><br>
                    <small>${(format.size / (1024*1024)).toFixed(1)} MB</small>
                `;
                div.onclick = () => selectFormat(format, div);
                container.appendChild(div);
            });
            
            if (filtered.length === 0) {
                container.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#ff9999;">Tidak ada format tersedia</p>';
            }
        }
        
        function selectFormat(format, element) {
            document.querySelectorAll('.format-card').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedFormat = format;
        }
        
        function downloadSelected() {
            if (!selectedFormat || !selectedFormat.download_url) {
                alert('Pilih format terlebih dahulu!');
                return;
            }
            
            const link = document.createElement('a');
            link.href = selectedFormat.download_url;
            link.download = `yt_${Date.now()}.${selectedFormat.format.toLowerCase()}`;
            link.click();
            
            // Save to history
            addToHistory(selectedFormat);
        }
        
        function addToHistory(format) {
            downloadHistory.unshift({
                title: currentInfo.title,
                quality: format.quality || format.format,
                url: format.download_url,
                time: new Date().toLocaleTimeString()
            });
            
            if (downloadHistory.length > 5) downloadHistory.pop();
            
            renderHistory();
        }
        
        function renderHistory() {
            const container = document.getElementById('historyList');
            container.innerHTML = '';
            downloadHistory.forEach(item => {
                const div = document.createElement('div');
                div.style = 'background:rgba(255,255,255,0.05);padding:12px;margin:8px 0;border-radius:10px;font-size:14px;';
                div.innerHTML = `<strong>${item.title}</strong><br><small>${item.quality} • ${item.time}</small>`;
                container.appendChild(div);
            });
            document.getElementById('historySection').style.display = 'block';
        }
        
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        function showError(msg) {
            const err = document.getElementById('error');
            err.textContent = msg;
            err.style.display = 'block';
        }
        
        function resetUI() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            selectedFormat = null;
        }
        
        // Keyboard support
        document.getElementById('urlInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') startDownload();
        });
        
        console.log('%cYT Downloader Pro Ready!', 'color:#ff0000;font-size:16px;font-weight:bold');
    </script>
</body>
</html>
