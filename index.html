<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader</title>
    <style>
        body { font-family: Arial; background: #0f0c29; color: white; padding: 20px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; }
        button { padding: 15px; margin: 5px; border: none; border-radius: 10px; font-size: 16px; }
        .red { background: #ff0000; color: white; }
        .green { background: #00c853; color: white; }
        .result { margin-top: 20px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; display: none; }
    </style>
</head>
<body>
    <h1>🎥 YT Downloader</h1>
    <input type="text" id="url" placeholder="Paste link YouTube" />
    <br>
    <button class="red" onclick="download('video')">Video MP4</button>
    <button class="green" onclick="download('audio')">Musik MP3</button>

    <div id="result" class="result">
        <img id="thumb" width="100%" style="border-radius:10px;">
        <h3 id="title"></h3>
        <div id="formats"></div>
    </div>

    <script>
        async function download(type) {
            const url = document.getElementById('url').value.trim();
            if (!url) return alert("Masukkan link!");

            const res = document.getElementById('result');
            res.style.display = 'none';

            try {
                const form = new URLSearchParams({
                    auth: "20250901majwlqo",
                    domain: "api-ak.vidssave.com",
                    origin: "cache",
                    link: url
                });

                const response = await fetch("https://api.vidssave.com/api/contentsite_api/media/parse", {
                    method: "POST",
                    headers: {"Content-Type": "application/x-www-form-urlencoded"},
                    body: form.toString()
                });

                const json = await response.json();
                const data = json.data || json;

                document.getElementById('thumb').src = data.thumbnail || '';
                document.getElementById('title').textContent = data.title || 'Video';

                const container = document.getElementById('formats');
                container.innerHTML = '';

                (data.resources || []).forEach(r => {
                    if ((type === 'video' && r.type !== 'video') || (type === 'audio' && r.type !== 'audio')) return;
                    const btn = document.createElement('button');
                    btn.innerHTML = `${r.quality || r.format} - ${(r.size/1024/1024).toFixed(1)} MB`;
                    btn.style.margin = "5px";
                    btn.onclick = () => window.open(r.download_url, '_blank');
                    container.appendChild(btn);
                });

                res.style.display = 'block';
            } catch (e) {
                alert("Gagal: " + e.message);
            }
        }
    </script>
</body>
</html>
